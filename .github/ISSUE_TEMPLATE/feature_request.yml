name: Feature Request
description: Suggest an improvement for database traffic analysis workflows
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for workflow, UI, export, search, reporting, or investigation improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What investigation or DBA workflow are you trying to improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like DBForensics to support?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - PCAP import
        - SQL reconstruction
        - Session / connection view
        - SQL event timeline
        - Search / filters
        - Incident summary
        - SQL detail
        - Protocol detail
        - Export / report
        - Packaging / install
        - Other
    validations:
      required: true
  - type: textarea
    id: current-tools
    attributes:
      label: Current workaround or tools
      description: How do you solve this today? Wireshark, scripts, logs, database audit tools, etc.
  - type: textarea
    id: examples
    attributes:
      label: Examples or screenshots
      description: Add mockups, screenshots, sample outputs, or anonymized examples if useful.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
